<!-- templates/includes/menu.html -->
<nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">{{ competition }}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link{% if request.endpoint == 'index' %} active{% endif %}" href="{{ url_for('index') }}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.endpoint == 'data' %} active{% endif %}" href="{{ url_for('data') }}">Data</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.endpoint == 'columns' %} active{% endif %}" href="{{ url_for('columns') }}">Columns</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.endpoint == 'ideas' %} active{% endif %}" href="{{ url_for('ideas') }}">Ideas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.endpoint == 'rules' %} active{% endif %}" href="{{ url_for('rules') }}">Rules</a>
        </li>
      </ul>
      <form class="d-flex">
        <select class="custom-select mr-sm-2 mx-1" id="comp-competition" aria-label="Switch Competition">
          {% for key, value in competition_directories.items() %}
            <option value="{{ key }}" {% if key == mach_competition %} selected {% endif %}>{{ value }}</option>
          {% endfor %}
        </select>
      </form>
      <form class="d-flex me-3 mt-3 mt-lg-0">
        <select class="custom-select mx-1" id="comp-submission" aria-label="Switch Submission">
          {% for key, value in submission_directories.items() %}
            <option value="{{ key }}" {% if key == mach_submission %} selected {% endif %}>{{ value }}</option>
          {% endfor %}
        </select>
      </form>
    </div>
  </div>
</nav>
